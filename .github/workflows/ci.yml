name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm run build
      # Smoke tests hit 50 live upstream APIs that are China-hosted;
      # GitHub Actions runners in the US/EU get geo-blocked on most of them.
      # tsc is the load-bearing check here — catches type drift on every PR.
      # Run the smoke test locally before publishing.

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
