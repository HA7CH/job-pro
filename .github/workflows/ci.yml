name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm run build
      # Pure unit tests (no network) — saveProfile / applyFormFile / regex
      # validators. The 3 live-network smoke suites (test, test:apply,
      # test:debug-submit) hit China-hosted careers APIs that GitHub Actions
      # runners get geo-blocked on, so they only run locally.
      - run: npm run test:unit

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No root package-lock.json (npm arborist hits a known dedupe crash on
      # this dep tree locally). Use `npm install` so CI works without one.
      - run: npm install
      - run: npm run build
